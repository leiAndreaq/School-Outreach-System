<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AccoutureAI — Login</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Login Styles -->
  <link rel="stylesheet" href="/css/login.css"/>
</head>
<body>

  <!-- Background Pattern -->
  <div class="bg-pattern"></div>

  <!-- Login Card -->
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="login-logo">
        ACCOUTURE<span>AI</span>
      </div>
      <div class="login-tagline">Powered by ThinkTANQ</div>
      <div class="login-subtitle">
        School Outreach CRM — Secure Access
      </div>
    </div>

    <!-- Body -->
    <div class="login-body">
      <div class="login-title">Welcome Back 👋</div>
      <div class="login-desc">
        Enter your password to access the CRM dashboard.
      </div>

      <!-- Password Field -->
      <div>
        <label class="login-label">Password</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="passwordInput"
            class="login-input"
            placeholder="Enter your password"
            onkeydown="handleKeyDown(event)"
            oninput="clearError()"
            autofocus
          />
          <button
            type="button"
            class="toggle-password"
            onclick="togglePassword()"
            id="toggleBtn">
            👁
          </button>
        </div>
      </div>

      <!-- Error Message -->
      <div class="login-error" id="loginError"></div>

      <!-- Attempts Warning -->
      <div class="attempts-warning" id="attemptsWarning"></div>

      <!-- Login Button -->
      <button
        class="login-btn"
        id="loginBtn"
        onclick="handleLogin()">
        <span id="loginBtnText">Login to CRM</span>
      </button>

    </div>

    <!-- Footer -->
    <div class="login-footer">
      🔒 This is a private system. Unauthorized access is prohibited.<br/>
      © 2026 ThinkTANQ Business Creation & Management OPC
    </div>

  </div>

  <!-- Login JS -->
  <script src="/js/login.js"></script>

</body>
</html>
